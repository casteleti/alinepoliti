services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-alinepoliti}
      - DB_USER=${DB_USER:-alinepoliti}
      - DB_PASS=${DB_PASS}
    ports:
      - "80"
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=alinepoliti
      - MYSQL_USER=alinepoliti
      - MYSQL_PASSWORD=${DB_PASS}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASS}
    volumes:
      - db-data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

volumes:
  db-data:
